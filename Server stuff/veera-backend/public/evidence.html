<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEERA | Evidence Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0f12; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 34, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <h1 class="text-3xl font-black tracking-widest text-white"><i class="fa-solid fa-folder-open text-red-500"></i> EVIDENCE VAULT</h1>
            <div id="uid-display" class="text-gray-500 font-mono text-sm"></div>
        </div>

        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-gray-500">Loading evidence...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        document.getElementById('uid-display').innerText = `USER UID: ${uid}`;

        async function fetchEvidence() {
            if (!uid) return;
            try {
                const res = await fetch(`/api/evidence/${uid}`);
                const data = await res.json();
                const gallery = document.getElementById('gallery');
                
                if (!data.files || data.files.length === 0) {
                    gallery.innerHTML = '<div class="text-gray-500 col-span-full">No evidence files found for this user yet. Data will appear here once an SOS is triggered and chunks are uploaded.</div>';
                    return;
                }

                gallery.innerHTML = '';
                data.files.forEach(file => {
                    const date = new Date(parseInt(file.name.split('.')[0]));
                    const timeString = date.toLocaleString();
                    
                    const card = document.createElement('div');
                    card.className = 'glass-panel rounded-xl overflow-hidden shadow-lg border border-gray-800 flex flex-col';
                    
                    let mediaHtml = '';
                    if (file.type === 'video') {
                        mediaHtml = `<video controls class="w-full h-48 bg-black object-contain"><source src="${file.url}" type="video/mp4"></video>`;
                    } else if (file.type === 'audio') {
                        mediaHtml = `<div class="h-48 bg-gray-900 flex items-center justify-center p-4"><audio controls class="w-full"><source src="${file.url}" type="audio/mp4"></audio></div>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <div class="p-4 bg-gray-900/50">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-mono text-gray-400"><i class="fa-regular fa-clock"></i> ${timeString}</span>
                                <span class="px-2 py-1 text-[10px] rounded uppercase font-bold tracking-wider ${file.type === 'video' ? 'bg-blue-500/20 text-blue-400' : 'bg-purple-500/20 text-purple-400'}">${file.type}</span>
                            </div>
                            <div class="mt-3">
                                <a href="${file.url}" download class="text-sm text-gray-300 hover:text-white transition-colors"><i class="fa-solid fa-download"></i> Download Original File</a>
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } catch(e) {
                console.error(e);
            }
        }

        fetchEvidence();
        // Auto refresh evidence every 3 seconds to match the chunking pipeline
        setInterval(fetchEvidence, 3000);
    </script>
</body>
</html>
