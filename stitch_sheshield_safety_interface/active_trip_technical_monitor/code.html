<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Trip Monitoring</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#bc0051",
                    "outline-variant": "#5b3f44",
                    "surface-container-low": "#1b1b1b",
                    "surface-container": "#1f1f1f",
                    "inverse-surface": "#e2e2e2",
                    "tertiary-fixed": "#e4e2e2",
                    "on-secondary-fixed-variant": "#454747",
                    "on-tertiary-container": "#292a2a",
                    "surface-variant": "#353535",
                    "on-secondary-container": "#b4b5b5",
                    "on-background": "#e2e2e2",
                    "on-primary-fixed": "#3f0017",
                    "error": "#ffb4ab",
                    "tertiary-fixed-dim": "#c8c6c6",
                    "on-error-container": "#ffdad6",
                    "background": "#131313",
                    "tertiary": "#c8c6c6",
                    "surface-container-high": "#2a2a2a",
                    "inverse-on-surface": "#303030",
                    "outline": "#ab888e",
                    "secondary-fixed": "#e2e2e2",
                    "on-tertiary": "#303030",
                    "surface-tint": "#ffb1c0",
                    "primary-fixed-dim": "#ffb1c0",
                    "surface": "#131313",
                    "on-tertiary-fixed": "#1b1c1c",
                    "surface-container-highest": "#353535",
                    "on-primary-fixed-variant": "#90003d",
                    "on-surface-variant": "#e4bdc3",
                    "on-secondary-fixed": "#1a1c1c",
                    "surface-container-lowest": "#0e0e0e",
                    "primary-fixed": "#ffd9df",
                    "primary": "#ffb1c0",
                    "surface-dim": "#131313",
                    "secondary-container": "#454747",
                    "on-primary-container": "#5a0023",
                    "on-error": "#690005",
                    "primary-container": "#ff4c83",
                    "on-secondary": "#2f3131",
                    "on-primary": "#660029",
                    "surface-bright": "#393939",
                    "tertiary-container": "#919090",
                    "on-surface": "#e2e2e2",
                    "error-container": "#93000a",
                    "secondary": "#c6c6c7",
                    "secondary-fixed-dim": "#c6c6c7",
                    "on-tertiary-fixed-variant": "#474747"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "16px",
                    "stack-sm": "8px",
                    "edge-margin-desktop": "48px",
                    "gutter": "16px",
                    "unit": "4px",
                    "touch-target-min": "56px",
                    "edge-margin-mobile": "24px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "display-lg-mobile": ["Sora"],
                    "body-lg": ["Sora"],
                    "label-bold": ["Sora"],
                    "label-sm": ["Sora"],
                    "body-md": ["Sora"],
                    "display-lg": ["Sora"],
                    "headline-lg": ["Sora"],
                    "headline-md": ["Sora"]
            },
            "fontSize": {
                    "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0.03em", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.03em", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "0.02em", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0.01em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "0.01em", "fontWeight": "700"}]

          }

      }

<style>
        .grid-overlay {
            background-image: 
                linear-gradient(to right, #353535 1px, transparent 1px),
                linear-gradient(to bottom, #353535 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .route-glow {
            filter: drop-shadow(0 0 8px rgba(255, 76, 131, 0.6));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden relative font-body-md select-none">
<!-- Background Layer: Technical Ghost Map -->
<div class="absolute inset-0 z-0 bg-background">
<img alt="Map" class="w-full h-full object-cover opacity-20 grayscale contrast-150 mix-blend-screen" data-alt="A highly stylized, dark digital map interface viewed from a top-down perspective. The map consists of glowing, sharp architectural lines and street grids in varying shades of dark charcoal and deep obsidian, creating a high-contrast 'ghost map' aesthetic. There are no textures or realistic details, only precise vector-like pathways. The mood is tense, technical, and hyper-focused, illuminated entirely by a stark, minimal palette with zero ambient light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAr8FwfL1zrPcbGwXh_71wXt9mqt8v7aBkIXCELNLq4HuC90Rz8F9GhW3VSg3u7SmqtUnbxf2ArSZI9kvQT3pZ-DRAX-aEN38C64rQWVVnsNxDm8UhvIUG2W-ipJXkNozGxyX9KQvTembMfcPWcoFJ3A3W5n3dhf_1RD2kuBxbvm65b1UTXgFP8-5I089NUOg6oatdY22S070E_r3V5ZtuHKvv0AWetOHvWHmaNoEz3a4jaJIQb5YbnjoimUIGXV1hfYd_weaH2-Zha"/>
<div class="absolute inset-0 grid-overlay opacity-40"></div>
<!-- Rendered Route Line -->
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="route-glow" d="M 25 85 L 45 60 L 40 40 L 75 25" fill="none" stroke="#ff4c83" stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"></path>
<!-- Active Pulse Point -->
<circle class="animate-pulse" cx="75" cy="25" fill="#ffb1c0" r="2"></circle>
<!-- Origin Marker -->
<rect fill="#131313" height="4" stroke="#e2e2e2" stroke-width="1" width="4" x="23" y="83"></rect>
</svg>
</div>
<!-- Top Floating Status -->
<div class="absolute top-edge-margin-mobile left-edge-margin-mobile right-edge-margin-mobile z-10 flex justify-between items-start pointer-events-none">
<div class="bg-primary-container text-on-primary-container px-4 py-3 border-2 border-primary-container inline-flex items-center gap-2 shadow-[0_0_15px_rgba(255,76,131,0.3)] pointer-events-auto">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">gps_fixed</span>
<span class="font-label-bold text-label-bold uppercase tracking-[0.1em]">On Track</span>
</div>
<div class="bg-surface-container-highest text-on-surface px-3 py-2 border-2 border-surface-variant font-label-bold text-label-bold font-mono tracking-widest opacity-80">
            SYS.ACTIVE
        </div>
</div>
<!-- Bottom Telemetry Panel (Trigger Zone) -->
<div class="absolute bottom-0 left-0 w-full bg-background border-t-4 border-surface-variant z-20 flex flex-col pt-stack-md pb-edge-margin-mobile px-edge-margin-mobile shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
<!-- Technical Data Grid -->
<div class="grid grid-cols-3 gap-gutter pb-stack-lg border-b-2 border-surface-variant mb-stack-lg">
<div class="flex flex-col gap-unit">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">Lat/Long</span>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-background tracking-tighter">40.71°N</span>
<span class="font-headline-md text-headline-md text-on-background tracking-tighter">74.00°W</span>
</div>
</div>
<div class="flex flex-col gap-unit border-l-2 border-surface-variant pl-gutter">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest">ETA</span>
<span class="font-display-lg-mobile text-display-lg-mobile text-on-background tracking-tighter mt-auto">12<span class="font-label-bold text-label-bold ml-1 text-secondary">MIN</span></span>
</div>
<div class="flex flex-col gap-unit border-l-2 border-surface-variant pl-gutter items-end text-right">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-widest w-full text-right">Signal</span>
<div class="flex items-center gap-2 text-primary mt-auto">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">signal_cellular_4_bar</span>
<span class="font-headline-md text-headline-md tracking-tighter">STR</span>
</div>
</div>
</div>
<!-- Action Triggers -->
<div class="flex flex-col gap-stack-md w-full max-w-2xl mx-auto">
<button class="w-full h-touch-target-min bg-transparent border-2 border-on-background text-on-background flex justify-center items-center gap-3 uppercase font-label-bold text-label-bold tracking-widest active:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">warning</span>
                Report Issue
            </button>
<!-- Massive Trigger Button -->
<button class="w-full h-[120px] bg-primary-container text-on-primary-container border-2 border-primary-container flex justify-center items-center uppercase font-headline-lg text-headline-lg tracking-[0.05em] active:scale-[0.98] transition-transform shadow-[0_0_20px_rgba(255,76,131,0.2)]">
<span class="material-symbols-outlined mr-4 text-[40px]" style="font-variation-settings: 'FILL' 1;">shield</span>
                End Trip Safely
            </button>
</div>
</div>
</body></html>
