<style>

<body class="bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col items-center justify-between font-body-md select-none pulse-bg p-edge-margin-mobile md:p-edge-margin-desktop pt-16 md:pt-16 pb-[120px] md:pb-[120px]">
<!-- Header / Warning -->
<div class="flex flex-col items-center w-full max-w-2xl text-center space-y-stack-sm mt-8">
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">warning</span>
<h1 class="font-display-lg text-display-lg text-primary uppercase tracking-widest border-4 border-primary px-8 py-4 w-full">SOS ACTIVE</h1>
<p class="font-headline-md text-headline-md text-on-surface mt-stack-md">EMERGENCY PROTOCOL ENGAGED</p>
</div>
<!-- Actions -->
<div class="flex flex-col md:flex-row gap-stack-lg w-full max-w-3xl justify-center items-center mt-stack-lg flex-grow">
<button class="flex flex-col items-center justify-center w-[140px] h-[140px] rounded-full border-4 border-[#4A4A4A] bg-[#131313] hover:border-on-surface active:bg-primary active:border-primary group transition-all">
<span class="material-symbols-outlined text-[48px] text-on-surface group-active:text-on-primary mb-2" style="font-variation-settings: 'FILL' 1;">local_police</span>
<span class="font-label-bold text-label-bold text-on-surface group-active:text-on-primary uppercase text-center leading-tight">AUTHORITIES</span>
</button>
<button class="flex flex-col items-center justify-center w-[140px] h-[140px] rounded-full border-4 border-[#4A4A4A] bg-[#131313] hover:border-on-surface active:bg-primary active:border-primary group transition-all">
<span class="material-symbols-outlined text-[48px] text-on-surface group-active:text-on-primary mb-2" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-label-bold text-label-bold text-on-surface group-active:text-on-primary uppercase text-center leading-tight">MEDICAL</span>
</button>
<button class="flex flex-col items-center justify-center w-[140px] h-[140px] rounded-full border-4 border-[#4A4A4A] bg-[#131313] hover:border-on-surface active:bg-primary active:border-primary group transition-all">
<span class="material-symbols-outlined text-[48px] text-on-surface group-active:text-on-primary mb-2" style="font-variation-settings: 'FILL' 1;">contact_emergency</span>
<span class="font-label-bold text-label-bold text-on-surface group-active:text-on-primary uppercase text-center leading-tight px-2">TRUSTED CONTACT</span>
</button>
</div>
<!-- Telemetry -->
<div class="w-full max-w-2xl border-2 border-[#4A4A4A] bg-[#131313] p-stack-md mt-stack-lg flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-stack-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary animate-pulse" style="font-variation-settings: 'FILL' 1;">satellite_alt</span>
<span class="font-body-md text-body-md text-on-surface uppercase">TRANSMITTING LOCATION...</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#4A4A4A]" style="font-variation-settings: 'FILL' 1;">my_location</span>
<span class="font-body-md text-body-md text-on-surface uppercase">ACCURACY: &lt;5M</span>
</div>
</div>
<!-- Hold to Cancel -->
<div class="fixed bottom-0 left-0 w-full p-edge-margin-mobile md:p-edge-margin-desktop bg-background z-50 flex justify-center">
<button class="relative w-full max-w-2xl h-[120px] bg-transparent border-4 border-on-surface overflow-hidden group" id="cancel-btn">
<div class="absolute left-0 top-0 h-full bg-on-surface w-0 progress-bar" id="progress"></div>
<div class="relative z-10 w-full h-full flex items-center justify-center pointer-events-none">
<span class="font-headline-md text-headline-md text-on-surface group-active:text-background transition-colors uppercase tracking-widest mix-blend-difference">HOLD TO CANCEL</span>
</div>
</button>
</div>
<script>
        const btn = document.getElementById('cancel-btn');
        const progress = document.getElementById('progress');
        let holdTimer;
        let progressInterval;
        const holdDuration = 3000; // 3 seconds
        let currentWidth = 0;

        const startHold = (e) => {
            e.preventDefault();
            currentWidth = 0;
            progress.style.width = '0%';
            
            progressInterval = setInterval(() => {
                currentWidth += (100 / (holdDuration / 100));
                progress.style.width = `${Math.min(currentWidth, 100)}%`;
            }, 100);

            holdTimer = setTimeout(() => {
                clearInterval(progressInterval);
                progress.style.width = '100%';
                // alert('SOS Cancelled');
                // document.body.innerHTML = '<div class="h-screen flex items-center justify-center font-display-lg text-on-surface uppercase">CANCELLED</div>';
                setTimeout(() => {
                     progress.style.width = '0%';
                }, 500);
            }, holdDuration);
        };

        const cancelHold = (e) => {
            e.preventDefault();
            clearTimeout(holdTimer);
            clearInterval(progressInterval);
            currentWidth = 0;
            progress.style.width = '0%';
        };

        btn.addEventListener('mousedown', startHold);
        btn.addEventListener('mouseup', cancelHold);
        btn.addEventListener('mouseleave', cancelHold);
        btn.addEventListener('touchstart', startHold);
        btn.addEventListener('touchend', cancelHold);
        btn.addEventListener('touchcancel', cancelHold);
    </script>
